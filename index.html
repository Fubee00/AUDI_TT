<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NFS MW - Mobile Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        
        body { 
            background-color: #000; margin: 0; padding: 0;
            width: 100vw; height: 100vh; overflow: hidden;
            font-family: 'Orbitron', sans-serif;
            display: flex; align-items: flex-end; justify-content: space-between;
        }

        /* Container für die linke Seite (NOS + Gänge) */
        .left-side {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        #nos-btn {
            width: 80px; height: 80px; border-radius: 50%;
            border: 3px solid #0099ff; background: rgba(0, 150, 255, 0.2);
            display: flex; justify-content: center; align-items: center; color: white;
            font-size: 18px; font-weight: bold;
        }

        .gear-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-gear {
            width: 70px; height: 70px; background: rgba(255, 255, 255, 0.1);
            border: 2px solid #fff; color: white; font-size: 35px;
            display: flex; justify-content: center; align-items: center; border-radius: 12px;
        }

        /* Container für die rechte Seite (Tacho + Turbo) */
        .right-side {
            position: relative;
            width: 300px; /* Begrenzt die Gesamtbreite am Handy */
            height: 380px;
            margin-right: 10px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        .tacho-box { 
            position: relative; 
            width: 280px; 
            height: 280px; 
        }

        .tacho-bg { width: 100%; height: 100%; object-fit: contain; }
        
        .nadel {
            position: absolute; height: 50%; top: 50%; left: 50%;
            transform-origin: 50% 82%;
            transform: translate(-50%, -82%) rotate(-120deg);
            will-change: transform;
        }

        .speedo-digital {
            position: absolute; z-index: 10; bottom: 15%; left: 50%;
            transform: translateX(-50%); color: #ffcc00; text-align: center;
        }

        .turbo-unit { 
            position: relative; 
            width: 240px; 
            height: 100px; 
            margin-top: -50px; /* Zieht den Turbo unter/in den Tacho */
        }
        .turbo-bg-img { width: 100%; height: auto; }
        .turbo-needle {
            position: absolute; height: 130px; left: 50%; top: -65%;
            transform-origin: 50% 5%;
        }

        /* Skalierung für ganz kleine Handys */
        @media (max-width: 650px) {
            .right-side { transform: scale(0.8); transform-origin: bottom right; }
            .left-side { transform: scale(0.8); transform-origin: bottom left; }
        }
    </style>
</head>
<body>

    <div class="left-side">
        <div id="nos-btn">NOS</div>
        <div class="gear-buttons">
            <div class="btn-gear" onclick="shiftGear('up')">+</div>
            <div class="btn-gear" onclick="shiftGear('down')">-</div>
        </div>
    </div>

    <div class="right-side">
        <div class="tacho-box">
            <img src="tacho_bg.png" class="tacho-bg">
            <div class="speedo-digital">
                <span id="gear-val" style="font-size: 32px; color: white; display: block;">1</span>
                <span id="speed-val" style="font-size: 40px; font-weight: 900; display: block; color: #ffcc00;">000</span>
                <div style="font-size: 12px; color: #fff;">KM/H</div>
            </div>
            <img src="needle.png" id="needle" class="nadel">
        </div>

        <div class="turbo-unit">
            <img src="turb_bg.png" class="turbo-bg-img">
            <img src="turbo_needle.png" id="turbo-needle" class="turbo-needle">
        </div>
    </div>

<script>
    // JS bleibt gleich wie im letzten Post, aber achte auf:
    // needle.style.transform = `translate(-50%, -82%) rotate(${angle}deg)`;
</script>
</body>
</html>
