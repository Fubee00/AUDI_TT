<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NFS MW - Mobile Pro V2</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="data:application/manifest+json,{%22display%22:%22standalone%22,%22orientation%22:%22landscape%22}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
        }
        
        body { 
            background-color: #000; 
            margin: 0; padding: 0;
            width: 100vw; height: 100dvh;
            overflow: hidden; 
            font-family: 'Orbitron', sans-serif;
            display: flex;
            align-items: flex-end;
            justify-content: space-between; /* Tacho links, Buttons rechts */
            flex-direction: row-reverse; /* Spiegelt das Layout */
        }

        /* LENKZONE LINKS */
        #steering-zone {
            position: fixed; left: 0; top: 0;
            width: 40vw; height: 100vh;
            z-index: 50;
            /* border: 1px dashed rgba(255,255,255,0.2); // Nur zum Testen */
        }

        /* BUTTONS RECHTS */
        .controls-right {
            padding: env(safe-area-inset-bottom, 20px) env(safe-area-inset-right, 20px);
            display: flex; flex-direction: column;
            gap: 15px; z-index: 200;
        }

        #nos-btn {
            width: 80px; height: 80px; border-radius: 50%;
            border: 2px solid #0099ff; background: rgba(0, 150, 255, 0.2);
            display: flex; justify-content: center; align-items: center; 
            color: white; font-size: 16px; margin-bottom: 10px;
        }

        .btn-gear {
            width: 80px; height: 80px; background: rgba(255, 255, 255, 0.1);
            border: 2px solid #fff; color: white; font-size: 35px;
            display: flex; justify-content: center; align-items: center; border-radius: 12px;
        }

        /* TACHO LINKS */
        .hud-left {
            padding: env(safe-area-inset-bottom, 10px) env(safe-area-inset-left, 15px);
            display: flex; flex-direction: column; align-items: center;
            width: 260px;
        }

        .tacho-box { position: relative; width: 220px; height: 220px; transition: transform 0.1s ease-out; }
        .tacho-bg { width: 100%; height: 100%; object-fit: contain; position: absolute; z-index: 2; }
        
        .nadel {
            position: absolute; height: 50%; top: 50%; left: 50%;
            transform-origin: 50% 82%;
            transform: translate(-50%, -82%) rotate(-120deg);
            pointer-events: none;
        }

        .speedo-digital {
            position: absolute; z-index: 10; bottom: 12%; left: 50%;
            transform: translateX(-50%); color: #ffcc00; text-align: center;
        }

        .turbo-unit { position: relative; width: 200px; height: 80px; margin-top: -35px; z-index: 1; }
        .turbo-bg-img { width: 100%; height: auto; }
        .turbo-needle {
            position: absolute; height: 120px; left: 50%; top: -60%;
            transform-origin: 50% 5%; z-index: 10;
        }

        #fs-trigger {
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            padding: 5px 15px; background: rgba(255,255,255,0.1); color: white;
            border: 1px solid #fff; border-radius: 5px; font-size: 10px; z-index: 1000;
        }
    </style>
</head>
<body>

    <button id="fs-trigger">FULLSCREEN</button>
    <div id="steering-zone"></div>

    <div class="controls-right">
        <div id="nos-btn" class="control-element">NOS</div>
        <div class="btn-gear control-element" id="gear-up">+</div>
        <div class="btn-gear control-element" id="gear-down">-</div>
    </div>

    <div class="hud-left">
        <div class="tacho-box" id="tacho-main">
            <img src="tacho_bg.png" class="tacho-bg">
            <div class="speedo-digital">
                <span id="gear-val" style="font-size: 28px; color: white; display: block;">1</span>
                <span id="speed-val" style="font-size: 38px; font-weight: 900; display: block;">000</span>
                <div style="font-size: 10px; color: #fff; opacity: 0.8;">KM/H</div>
            </div>
            <img src="needle.png" id="needle" class="nadel">
        </div>

        <div class="turbo-unit">
            <img src="turb_bg.png" class="turbo-bg-img">
            <img src="turbo_needle.png" id="turbo-needle" class="turbo-needle">
        </div>
    </div>

<script>
    const needle = document.getElementById('needle');
    const turboNeedle = document.getElementById('turbo-needle');
    const speedDisplay = document.getElementById('speed-val');
    const gearDisplay = document.getElementById('gear-val');
    const tachoMain = document.getElementById('tacho-main');

    let rpm = 0, currentGear = 1, turboCharge = 0, gas = 0, realSpeed = 0, lenkung = 0;
    let isNosActive = false;
    const gearRatios = [0, 50, 95, 140, 190, 245, 320];

    // MULTITOUCH TRACKER
    let activeTouches = {};

    window.addEventListener('touchstart', (e) => {
        for (let i = 0; i < e.changedTouches.length; i++) {
            let t = e.changedTouches[i];
            let target = t.target;

            // Rechts: Gas & Schalten
            if (t.clientX > window.innerWidth * 0.4) {
                if (target.id === 'gear-up') { shiftGear('up'); activeTouches[t.identifier] = 'btn'; }
                else if (target.id === 'gear-down') { shiftGear('down'); activeTouches[t.identifier] = 'btn'; }
                else if (target.id === 'nos-btn') { isNosActive = true; activeTouches[t.identifier] = 'nos'; }
                else {
                    activeTouches[t.identifier] = { type: 'gas', startY: t.clientY };
                }
            } 
            // Links: Lenken
            else {
                activeTouches[t.identifier] = { type: 'steer', startX: t.clientX };
            }
        }
    }, {passive: false});

    window.addEventListener('touchmove', (e) => {
        if (e.cancelable) e.preventDefault();
        for (let i = 0; i < e.changedTouches.length; i++) {
            let t = e.changedTouches[i];
            let data = activeTouches[t.identifier];

            if (data && data.type === 'gas') {
                let weg = data.startY - t.clientY;
                gas = weg > 0 ? Math.min(weg / 200, 1) : 0;
            }
            if (data && data.type === 'steer') {
                let diffX = t.clientX - data.startX;
                lenkung = Math.max(-1, Math.min(1, diffX / 100)); // 100px für Volleinschlag
            }
        }
    }, {passive: false});

    window.addEventListener('touchend', (e) => {
        for (let i = 0; i < e.changedTouches.length; i++) {
            let t = e.changedTouches[i];
            let data = activeTouches[t.identifier];
            if (data === 'nos') isNosActive = false;
            if (data && data.type === 'gas') gas = 0;
            if (data && data.type === 'steer') lenkung = 0;
            delete activeTouches[t.identifier];
        }
    });

    function shiftGear(dir) {
        if (dir === 'up' && currentGear < 6) { currentGear++; rpm *= 0.65; }
        else if (dir === 'down' && currentGear > 1) { currentGear--; rpm = Math.min(rpm * 1.35, 7600); }
        gearDisplay.innerText = currentGear;
    }

    function update() {
        let rpmZiel = gas * 8000;
        rpm += (rpmZiel - rpm) * 0.12;
        
        let jitter = (rpm > 7750) ? (Math.random() - 0.5) * 12 : 0;
        if (rpm > 7750) rpm = 7750 + (Math.random() * 150);

        let speedZiel = (rpm / 8000) * gearRatios[currentGear];
        if (isNosActive && turboCharge > 0) speedZiel *= 1.25;
        realSpeed += (speedZiel - realSpeed) * 0.06;

        if (isNosActive && turboCharge > 0) turboCharge -= 0.6;
        else if (gas > 0.85) turboCharge = Math.min(turboCharge + 0.25, 100);

        // Nadel & Turbo Nadel Fix
        let angle = -120 + (rpm / 8000) * 240;
        needle.style.transform = `translate(-50%, -82%) rotate(${angle + jitter}deg)`;

        let turboAngle = 50 + (turboCharge * -1.0);
        turboNeedle.style.transform = `translate(-50%, 0) rotate(${turboAngle}deg)`;

        // Lenkung-Visualisierung
        tachoMain.style.transform = `rotate(${lenkung * 10}deg)`;

        speedDisplay.innerText = Math.floor(realSpeed).toString().padStart(3, '0');
        requestAnimationFrame(update);
    } 
    update();

    // Fullscreen-Trigger
    document.getElementById('fs-trigger').addEventListener('click', () => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    });
</script>
</body>
</html>
