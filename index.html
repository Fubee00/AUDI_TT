<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFS MW - Mobile HUD Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #000; 
            margin: 0; 
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden; 
            touch-action: none; 
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* SCHALT-BUTTONS links */
        .shift-controls {
            position: fixed; 
            left: env(safe-area-inset-left, 20px); 
            top: 50%; 
            transform: translateY(-50%);
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
            z-index: 200;
        }
        .btn-gear {
            width: 85px; height: 85px; 
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid #fff; 
            color: white; 
            font-size: 35px;
            display: flex; justify-content: center; align-items: center; 
            border-radius: 15px;
            user-select: none;
        }
        .btn-gear:active { background: rgba(255, 255, 255, 0.3); }

        /* HUD RECHTS */
        .hud-container {
            position: fixed; 
            bottom: 20px; 
            right: env(safe-area-inset-right, 20px); 
            width: 350px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            transform-origin: bottom right;
        }

        /* Skalierung für kleine Handys */
        @media (max-width: 800px) {
            .hud-container { transform: scale(0.75); }
            .shift-controls { transform: scale(0.85); }
        }

        .tacho-box { position: relative; width: 350px; height: 350px; }
        .tacho-bg { width: 100%; height: 100%; position: absolute; z-index: 2; pointer-events: none; }
        
        .redline-container {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            z-index: 1; overflow: hidden; pointer-events: none;
        }
        .redline-image {
            width: 100%; height: 100%;
            clip-path: inset(100% 0 0 0); 
            filter: drop-shadow(0 0 10px #ffcc00);
            transition: clip-path 0.1s linear;
        }
        .pulsing-redline { animation: redline-glow 0.4s infinite alternate; }
        @keyframes redline-glow {
            from { filter: drop-shadow(0 0 5px #ff3300) brightness(1); }
            to { filter: drop-shadow(0 0 20px #ff3300) brightness(1.6); }
        }

        .nadel {
            position: absolute; 
            height: 52%; 
            top: 50%; 
            left: 50%; 
            z-index: 5;
            filter: drop-shadow(0 0 8px #fff); 
            will-change: transform;
            pointer-events: none;
            /* Der Ankerpunkt muss exakt sitzen */
            transform-origin: 50% 82%; 
        }

        .speedo-digital {
            position: absolute; z-index: 3; bottom: 8%; left: 50%;
            transform: translateX(-50%); color: #ffcc00; text-align: center;
            pointer-events: none;
        }

        .turbo-unit { position: relative; width: 350px; height: 150px; margin-top: -65px; pointer-events: none; }
        .turbo-lines { width: 100%; height: auto; position: absolute; z-index: 1; }
        .turbo-needle {
            position: absolute; height: 165px; left: 50%; top: -70%; z-index: 10;
            transform-origin: 50% 5%; will-change: transform;
            filter: sepia(1) saturate(10) hue-rotate(5deg) drop-shadow(0 0 5px rgba(255, 100, 0, 0.8));
        }

        #nos-btn {
            position: fixed; 
            bottom: 30px; 
            left: 30px; 
            width: 90px; height: 90px;
            background: rgba(0, 150, 255, 0.2); 
            border: 3px solid #0099ff; 
            border-radius: 50%;
            color: white; font-weight: bold;
            display: flex; justify-content: center; align-items: center; 
            z-index: 100;
            user-select: none;
        }
    </style>
</head>
<body>

<div id="nos-btn">NOS</div>

<div class="shift-controls">
    <div class="btn-gear" id="btn-up">+</div>
    <div class="btn-gear" id="btn-down">-</div>
</div>

<div class="hud-container">
    <div class="tacho-box">
        <div class="redline-container">
            <img src="redline.png" id="redline-img" class="redline-image">
        </div>
        
        <img src="tacho_bg.png" class="tacho-bg">
        <div class="speedo-digital">
            <span id="gear-val" style="font-size: 38px; color: white; display: block;">1</span>
            <span id="speed-val" style="font-size: 50px; font-weight: 900; display: block;">000</span>
            <div style="font-size: 14px; color: #fff; opacity: 0.8;">KM/H</div>
        </div>
        <img src="needle.png" id="needle" class="nadel">
    </div>

    <div class="turbo-unit">
        <img src="turb_bg.png" class="turbo-lines">
        <img src="turbo_needle.png" id="turbo-needle" class="turbo-needle">
    </div>
</div>

<script>
    const needle = document.getElementById('needle');
    const turboNeedle = document.getElementById('turbo-needle');
    const redlineImg = document.getElementById('redline-img');
    const speedDisplay = document.getElementById('speed-val');
    const gearDisplay = document.getElementById('gear-val');
    const nosBtn = document.getElementById('nos-btn');

    let rpm = 0;
    let currentGear = 1;
    let turboCharge = 0; 
    let gas = 0;
    let realSpeed = 0;
    let isNosActive = false;
    let startY = 0;

    const gearRatios = [0, 60, 110, 160, 210, 260, 320];

    // Steuerung über IDs statt Inline-Onclick (besser für Mobile)
    document.getElementById('btn-up').addEventListener('touchstart', (e) => { e.preventDefault(); shiftGear('up'); });
    document.getElementById('btn-down').addEventListener('touchstart', (e) => { e.preventDefault(); shiftGear('down'); });

    function shiftGear(dir) {
        if (dir === 'up' && currentGear < 6) {
            currentGear++;
            rpm *= 0.6; 
        } else if (dir === 'down' && currentGear > 1) {
            currentGear--;
            rpm = Math.min(rpm * 1.4, 7500);
        }
        gearDisplay.innerText = currentGear;
    }

    nosBtn.addEventListener('touchstart', (e) => { e.preventDefault(); isNosActive = true; });
    nosBtn.addEventListener('touchend', () => { isNosActive = false; });

    // GAS-LOGIK: Finger nach oben ziehen = Gas
    window.addEventListener('touchstart', (e) => { 
        startY = e.touches[0].clientY; 
    }, { passive: false });

    window.addEventListener('touchmove', (e) => {
        if (e.cancelable) e.preventDefault();
        let currentY = e.touches[0].clientY;
        let weg = startY - currentY;
        gas = weg > 0 ? Math.min(weg / 300, 1) : 0; // 300px Zugweg für Vollgas
    }, { passive: false });

    window.addEventListener('touchend', () => { gas = 0; });

    function update() {
        // RPM
        let rpmZiel = gas * 8000;
        rpm += (rpmZiel - rpm) * 0.1;

        // Begrenzer
        let jitter = 0;
        if (rpm > 7700) {
            rpm = 7750 + (Math.random() * 150);
            jitter = (Math.random() - 0.5) * 10;
        }

        // Speed
        let speedZiel = (rpm / 8000) * gearRatios[currentGear];
        if (isNosActive && turboCharge > 0) speedZiel *= 1.25;
        realSpeed += (speedZiel - realSpeed) * 0.05;

        // Turbo / Redline Management
        if (isNosActive && turboCharge > 0) {
            turboCharge -= 0.8; 
        } else if (gas > 0.8) {
            turboCharge = Math.min(turboCharge + 0.3, 100); 
        }

        // Needle Rotation
        let angle = -120 + (rpm / 8000) * 240;
        needle.style.transform = `translate(-50%, -82%) rotate(${angle + jitter}deg)`;

        // Visuals
        let fillLevel = 100 - turboCharge;
        redlineImg.style.clipPath = `inset(${fillLevel}% 0 0 0)`;
        
        if (turboCharge >= 95) redlineImg.classList.add('pulsing-redline');
        else redlineImg.classList.remove('pulsing-redline');

        let turboAngle = 50 + (turboCharge * -1.0);
        turboNeedle.style.transform = `translate(-50%, 0) rotate(${turboAngle + jitter/2}deg)`;

        speedDisplay.innerText = Math.floor(realSpeed).toString().padStart(3, '0');

        requestAnimationFrame(update);
    } 
    update();
</script>
</body>
</html>
